# ============================================================================
# ScaleObs - Server Operations Portal Configuration (Sample)
# ============================================================================
# Copy this file to config/services.yml and fill in your values.

gateway:
    title: "ScaleObs"
    port: 8080
    auth:
        enabled: true
        jwt_secret: "change-me-to-a-random-secret"
        users:
            - username: "admin"
              password: "change-me"

# Headscale networks for automatic node discovery (support multiple)
headscale_networks:
#    - name: "primary"
#      url: https://headscale.example.com:8444
#      api_key: "your-headscale-api-key"

# Remote Docker daemons to monitor via TCP API
docker_hosts:
#    - name: "my-server"
#      host: "192.168.1.100"
#      port: 2375

# Coding agent annotations - tag hosts by IP with the agents they run
host_agents:
#    192.168.1.100: [codex]
#    192.168.1.101: [claude code]

# AI Agent Servers
# agent_servers:
#   - name: "Codex on Server"
#     url: http://192.168.1.100:8080

# Per-server overrides - Docker connection, SSH, and group for any server
# (works for headscale-discovered, agent-connected, and manually configured servers)
# server_overrides:
#     - id: hs-100.64.0.4
#       group: production
#       ssh:
#           host: 100.64.0.4
#           port: 22
#           user: root
#           password: ""
#       docker:
#           mode: api               # "agent" (default) or "api"
#           host: 100.64.0.4
#           port: 2375
#           tls: false
#           # tls_ca_cert: /etc/docker/ca.pem   # file path or inline PEM
#           # tls_cert: /etc/docker/cert.pem
#           # tls_key: /etc/docker/key.pem
#     - id: hs-100.64.0.3
#       group: staging

# Manually configured servers (complement headscale discovery)
servers:
    - id: main-server
      name: "Main Server"
      host: 127.0.0.1
      agent_port: 9090
      agent_token: "${AGENT_TOKEN}"
      tags: [prod, main]
      location: "local"
